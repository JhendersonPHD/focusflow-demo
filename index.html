<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - ADHD Focus Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Progress Ring */
        .progress-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .progress-ring {
            width: 120px;
            height: 120px;
            position: relative;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 8;
        }

        .progress-ring .bg {
            stroke: var(--card);
        }

        .progress-ring .progress {
            stroke: var(--secondary);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* Timer */
        .timer-section {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            margin: 20px 0;
        }

        .timer-display.focus {
            color: var(--primary);
        }

        .timer-display.break {
            color: var(--secondary);
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--card);
            color: var(--text);
            border: 2px solid var(--primary);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .presets {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }

        .preset-btn {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--text-muted);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover, .preset-btn.active {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Quote */
        .quote-section {
            background: linear-gradient(135deg, #1e293b, #334155);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .quote-text {
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .quote-author {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Tasks */
        .tasks-section {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .tasks-header h2 {
            font-size: 1.2rem;
        }

        .task-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .task-input input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid var(--bg);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
        }

        .task-input input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .task-item.completed {
            opacity: 0.5;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
        }

        .task-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Streak */
        .streak-section {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .streak-item {
            text-align: center;
        }

        .streak-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--warning);
        }

        .streak-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Stats */
        .stats-section {
            margin-top: 20px;
            padding: 20px;
            background: var(--card);
            border-radius: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }

        .stat-item {
            padding: 10px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Mode indicator */
        .mode-indicator {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .mode-indicator.focus {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        .mode-indicator.break {
            background: rgba(34, 197, 94, 0.2);
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FocusFlow</h1>
            <p style="color: var(--text-muted);">ADHD Focus Timer with Gamification</p>
        </div>

        <div class="progress-section">
            <div class="progress-ring">
                <svg width="120" height="120">
                    <circle class="bg" cx="60" cy="60" r="52"/>
                    <circle class="progress" cx="60" cy="60" r="52" 
                            stroke-dasharray="326.73" 
                            stroke-dashoffset="326.73"
                            id="progressCircle"/>
                </svg>
                <div class="progress-text" id="progressText">0%</div>
            </div>
        </div>

        <div class="timer-section">
            <div class="mode-indicator focus" id="modeIndicator">FOCUS MODE</div>
            <div class="timer-display focus" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Start</button>
                <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
                <button class="btn btn-danger" onclick="skipPhase()">Skip</button>
            </div>
            <div class="presets">
                <button class="preset-btn active" onclick="setPreset(25, 5)">25/5</button>
                <button class="preset-btn" onclick="setPreset(50, 10)">50/10</button>
                <button class="preset-btn" onclick="setPreset(15, 3)">15/3</button>
                <button class="preset-btn" onclick="setPreset(5, 1)">5/1</button>
            </div>
        </div>

        <div class="quote-section">
            <div class="quote-text" id="quoteText">"The secret of getting ahead is getting started."</div>
            <div class="quote-author" id="quoteAuthor">- Mark Twain</div>
        </div>

        <div class="tasks-section">
            <div class="tasks-header">
                <h2>Today's Tasks</h2>
                <span id="taskCount" style="color: var(--text-muted);">0 tasks</span>
            </div>
            <div class="task-input">
                <input type="text" id="taskInput" placeholder="Add a task..." onkeypress="if(event.key==='Enter')addTask()">
                <button class="btn btn-primary" onclick="addTask()">Add</button>
            </div>
            <ul class="task-list" id="taskList"></ul>
        </div>

        <div class="streak-section">
            <div class="streak-item">
                <div class="streak-number" id="streakDays">0</div>
                <div class="streak-label">Day Streak 🔥</div>
            </div>
            <div class="streak-item">
                <div class="streak-number" id="totalSessions">0</div>
                <div class="streak-label">Total Sessions</div>
            </div>
            <div class="streak-item">
                <div class="streak-number" id="totalMinutes">0</div>
                <div class="streak-label">Minutes</div>
            </div>
        </div>

        <div class="stats-section">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="todaySessions">0</div>
                    <div class="stat-label">Today</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="weekSessions">0</div>
                    <div class="stat-label">This Week</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="tasksCompleted">0</div>
                    <div class="stat-label">Done</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let timerInterval = null;
        let isRunning = false;
        let isFocusPhase = true;
        let timeRemaining = 25 * 60;
        let focusDuration = 25 * 60;
        let breakDuration = 5 * 60;
        
        let totalSessions = 0;
        let totalMinutes = 0;
        let todaySessions = 0;
        let weekSessions = 0;
        let streakDays = 0;
        let dailyGoal = 4;
        
        let tasks = [];
        let tasksCompleted = 0;

        // Quotes
        const quotes = [
            { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
            { text: "Focus on being productive instead of busy.", author: "Tim Ferriss" },
            { text: "It's not that I'm so smart, it's just that I stay with problems longer.", author: "Albert Einstein" },
            { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
            { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
            { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
            { text: "Action is the foundational key to all success.", author: "Pablo Picasso" },
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" }
        ];

        // Load state from localStorage
        function loadState() {
            const saved = localStorage.getItem('focusflow-state');
            if (saved) {
                const state = JSON.parse(saved);
                totalSessions = state.totalSessions || 0;
                totalMinutes = state.totalMinutes || 0;
                todaySessions = state.todaySessions || 0;
                weekSessions = state.weekSessions || 0;
                streakDays = state.streakDays || 0;
                tasks = state.tasks || [];
                tasksCompleted = state.tasksCompleted || 0;
                
                // Check if it's a new day
                const lastDate = state.lastDate;
                const today = new Date().toDateString();
                if (lastDate !== today) {
                    todaySessions = 0;
                    // Update streak
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    if (lastDate === yesterday.toDateString() && todaySessions > 0) {
                        streakDays++;
                    } else if (lastDate !== today) {
                        streakDays = 0;
                    }
                }
            }
            updateStats();
            renderTasks();
            randomQuote();
        }

        // Save state
        function saveState() {
            const state = {
                totalSessions,
                totalMinutes,
                todaySessions,
                weekSessions,
                streakDays,
                tasks,
                tasksCompleted,
                lastDate: new Date().toDateString()
            };
            localStorage.setItem('focusflow-state', JSON.stringify(state));
        }

        // Timer functions
        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            isRunning = true;
            document.getElementById('startBtn').textContent = 'Pause';
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                
                if (timeRemaining <= 0) {
                    phaseComplete();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            document.getElementById('startBtn').textContent = 'Start';
            clearInterval(timerInterval);
        }

        function resetTimer() {
            pauseTimer();
            timeRemaining = isFocusPhase ? focusDuration : breakDuration;
            updateTimerDisplay();
        }

        function skipPhase() {
            pauseTimer();
            switchPhase();
        }

        function switchPhase() {
            isFocusPhase = !isFocusPhase;
            timeRemaining = isFocusPhase ? focusDuration : breakDuration;
            updateTimerDisplay();
            updateModeIndicator();
        }

        function phaseComplete() {
            pauseTimer();
            
            if (isFocusPhase) {
                // Focus phase complete
                totalSessions++;
                todaySessions++;
                weekSessions++;
                totalMinutes += focusDuration / 60;
                streakDays++;
                
                // Play sound (using Web Audio API beep)
                playBeep();
                
                // Show notification
                if (Notification.permission === "granted") {
                    new Notification("FocusFlow", {
                        body: "Great job! Time for a break.",
                        icon: "🔥"
                    });
                }
                
                // Auto-switch to break
                isFocusPhase = false;
                timeRemaining = breakDuration;
            } else {
                // Break complete
                playBeep();
                
                if (Notification.permission === "granted") {
                    new Notification("FocusFlow", {
                        body: "Break's over! Ready to focus again?",
                        icon: "🎯"
                    });
                }
                
                // Auto-switch to focus
                isFocusPhase = true;
                timeRemaining = focusDuration;
            }
            
            updateModeIndicator();
            updateTimerDisplay();
            updateStats();
            saveState();
        }

        function playBeep() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = isFocusPhase ? 880 : 440;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (e) {
                console.log('Audio not supported');
            }
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timerDisplay').textContent = display;
            
            // Update progress ring
            const totalTime = isFocusPhase ? focusDuration : breakDuration;
            const progress = ((totalTime - timeRemaining) / totalTime) * 100;
            const circumference = 326.73;
            const offset = circumference - (progress / 100) * circumference;
            document.getElementById('progressCircle').style.strokeDashoffset = offset;
            document.getElementById('progressText').textContent = Math.round(progress) + '%';
        }

        function updateModeIndicator() {
            const indicator = document.getElementById('modeIndicator');
            if (isFocusPhase) {
                indicator.textContent = 'FOCUS MODE';
                indicator.className = 'mode-indicator focus';
                document.getElementById('timerDisplay').className = 'timer-display focus';
            } else {
                indicator.textContent = 'BREAK TIME';
                indicator.className = 'mode-indicator break';
                document.getElementById('timerDisplay').className = 'timer-display break';
            }
        }

        function setPreset(focus, breakTime) {
            focusDuration = focus * 60;
            breakDuration = breakTime * 60;
            
            // Update preset buttons
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Reset timer
            resetTimer();
        }

        // Stats
        function updateStats() {
            document.getElementById('totalSessions').textContent = totalSessions;
            document.getElementById('totalMinutes').textContent = Math.round(totalMinutes);
            document.getElementById('todaySessions').textContent = todaySessions;
            document.getElementById('weekSessions').textContent = weekSessions;
            document.getElementById('streakDays').textContent = streakDays;
            document.getElementById('tasksCompleted').textContent = tasksCompleted;
            
            // Update progress ring for daily goal
            const dailyProgress = Math.min((todaySessions / dailyGoal) * 100, 100);
            const circumference = 326.73;
            const offset = circumference - (dailyProgress / 100) * circumference;
            document.getElementById('progressCircle').style.strokeDashoffset = offset;
            document.getElementById('progressText').textContent = Math.round(dailyProgress) + '%';
        }

        // Tasks
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text) {
                tasks.push({ text, completed: false });
                input.value = '';
                renderTasks();
                saveState();
            }
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item' + (task.completed ? ' completed' : '');
                li.innerHTML = `
                    <input type="checkbox" class="task-checkbox" 
                           ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask(${index})">
                    <span class="task-text">${task.text}</span>
                    <button class="task-delete" onclick="deleteTask(${index})">×</button>
                `;
                list.appendChild(li);
            });
            
            document.getElementById('taskCount').textContent = `${tasks.length} tasks`;
        }

        function toggleTask(index) {
            const wasCompleted = tasks[index].completed;
            tasks[index].completed = !tasks[index].completed;
            
            if (tasks[index].completed && !wasCompleted) {
                tasksCompleted++;
            } else if (!tasks[index].completed && wasCompleted) {
                tasksCompleted--;
            }
            
            renderTasks();
            updateStats();
            saveState();
        }

        function deleteTask(index) {
            if (tasks[index].completed) {
                tasksCompleted--;
            }
            tasks.splice(index, 1);
            renderTasks();
            updateStats();
            saveState();
        }

        // Quote
        function randomQuote() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quoteText').textContent = `"${quote.text}"`;
            document.getElementById('quoteAuthor').textContent = `- ${quote.author}`;
        }

        // Initialize
        function init() {
            loadState();
            updateTimerDisplay();
            updateModeIndicator();
            
            // Request notification permission
            if (Notification.permission === "default") {
                Notification.requestPermission();
            }
        }

        init();
    </script>
</body>
</html>
